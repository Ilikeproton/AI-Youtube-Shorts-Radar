<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI YouTube Shorts Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
  <style>
    :root { --app-bg: radial-gradient(circle at top left, #18385b 0%, #07101e 45%, #02040a 100%); --card-bg: rgba(6, 14, 28, 0.82); --card-border: rgba(255, 255, 255, 0.08); --accent: #f97316; --accent-soft: rgba(249, 115, 22, 0.16); --text-muted: rgba(255, 255, 255, 0.64); }
    html, body, #app { height: 100%; margin: 0; font-family: "Space Grotesk", sans-serif; background: #04060c; color: #f8fafc; }
    body { background: var(--app-bg); overflow: hidden; }
    .boot-splash { position: fixed; inset: 0; z-index: 2500; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 20% 20%, rgba(28, 69, 115, 0.45) 0%, rgba(7, 16, 30, 0.94) 40%, rgba(2, 4, 10, 1) 100%); transition: opacity 240ms ease, visibility 240ms ease; }
    .boot-splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-shell { position: relative; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
    .boot-radar { position: relative; width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); background:
      radial-gradient(circle at center, rgba(249, 115, 22, 0.22) 0, rgba(249, 115, 22, 0.08) 22%, rgba(255, 255, 255, 0.02) 23%, rgba(255, 255, 255, 0.02) 24%, transparent 25%),
      radial-gradient(circle at center, transparent 0 38%, rgba(255, 255, 255, 0.06) 38.5%, transparent 39.5%),
      radial-gradient(circle at center, transparent 0 58%, rgba(255, 255, 255, 0.06) 58.5%, transparent 59.5%);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35), inset 0 0 34px rgba(56, 189, 248, 0.08); overflow: hidden; }
    .boot-radar::before { content: ""; position: absolute; inset: 10px; border-radius: 50%; border: 1px solid rgba(56, 189, 248, 0.16); }
    .boot-radar::after { content: ""; position: absolute; left: 50%; top: 50%; width: 12px; height: 12px; margin-left: -6px; margin-top: -6px; border-radius: 50%; background: #f97316; box-shadow: 0 0 24px rgba(249, 115, 22, 0.7); animation: boot-pulse 1.4s ease-in-out infinite; }
    .boot-sweep { position: absolute; inset: -12%; border-radius: 50%; background: conic-gradient(from 210deg, transparent 0deg, rgba(56, 189, 248, 0.04) 235deg, rgba(56, 189, 248, 0.38) 284deg, rgba(56, 189, 248, 0.04) 312deg, transparent 360deg); animation: boot-sweep 2.2s linear infinite; }
    .boot-title { font-size: 1.45rem; font-weight: 700; letter-spacing: 0.04em; }
    .boot-subtle { color: rgba(255, 255, 255, 0.64); font-size: 0.92rem; }
    .boot-dots { display: inline-flex; gap: 6px; align-items: center; justify-content: center; }
    .boot-dots span { width: 8px; height: 8px; border-radius: 50%; background: rgba(249, 115, 22, 0.42); animation: boot-dot 1s ease-in-out infinite; }
    .boot-dots span:nth-child(2) { animation-delay: 120ms; }
    .boot-dots span:nth-child(3) { animation-delay: 240ms; }
    @keyframes boot-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes boot-pulse { 0%, 100% { transform: scale(0.92); opacity: 0.78; } 50% { transform: scale(1.18); opacity: 1; } }
    @keyframes boot-dot { 0%, 100% { transform: translateY(0); opacity: 0.35; } 50% { transform: translateY(-6px); opacity: 1; } }
    .mono { font-family: "IBM Plex Mono", monospace; }
    .app-shell { height: 100%; display: grid; grid-template-columns: 360px minmax(0, 1fr) 340px; gap: 16px; padding: 16px; box-sizing: border-box; }
    .panel { background: var(--card-bg); border: 1px solid var(--card-border); backdrop-filter: blur(20px); border-radius: 28px; box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32); overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
    .panel-body { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 20px; }
    .panel-body::-webkit-scrollbar { width: 10px; }
    .panel-body::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.04); border-radius: 999px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.4); border-radius: 999px; border: 2px solid rgba(6, 14, 28, 0.85); }
    .panel-body { scrollbar-color: rgba(249, 115, 22, 0.55) rgba(255, 255, 255, 0.05); scrollbar-width: thin; }
    .panel-header { padding: 20px 20px 0; }
    .panel-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .window-controls { position: fixed; top: 12px; right: 14px; z-index: 1200; display: flex; gap: 8px; }
    .window-control { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(9, 17, 31, 0.58); color: #f8fafc; backdrop-filter: blur(18px); box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24); font-size: 1rem; cursor: pointer; transition: transform 140ms ease, background 140ms ease, opacity 140ms ease; opacity: 0.82; }
    .window-control:hover { transform: translateY(-1px); background: rgba(18, 31, 53, 0.92); opacity: 1; }
    .window-control.close:hover { background: rgba(127, 29, 29, 0.9); }
    .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .brand h1 { margin: 0; font-size: 1.4rem; line-height: 1.1; }
    .hero-chip { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: var(--accent-soft); color: #fed7aa; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .subtle { color: var(--text-muted); font-size: 0.9rem; }
    .status-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.04); color: #e2e8f0; text-transform: capitalize; }
    .status-pill.live { border-color: rgba(34, 197, 94, 0.28); background: rgba(21, 128, 61, 0.16); color: #bbf7d0; }
    .status-pill.complete { border-color: rgba(148, 163, 184, 0.22); background: rgba(51, 65, 85, 0.34); color: #cbd5e1; }
    .status-pill.stopped { border-color: rgba(245, 158, 11, 0.24); background: rgba(120, 53, 15, 0.18); color: #fde68a; }
    .status-pill.error { border-color: rgba(239, 68, 68, 0.24); background: rgba(127, 29, 29, 0.18); color: #fecaca; }
    .status-pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 rgba(34, 197, 94, 0.55); animation: live-pulse 1.35s ease-out infinite; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .stat-card { border-radius: 22px; padding: 16px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); }
    .stat-label { color: var(--text-muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { margin-top: 6px; font-size: 1.3rem; font-weight: 700; }
    .sidebar-stack { display: flex; flex-direction: column; gap: 18px; }
    .section-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
    .action-stack { position: sticky; bottom: 0; padding-top: 16px; background: linear-gradient(180deg, rgba(6, 14, 28, 0), rgba(6, 14, 28, 0.92) 22%, rgba(6, 14, 28, 0.98) 100%); }
    .settings-trigger { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(255, 255, 255, 0.04); color: #fff; cursor: pointer; transition: transform 140ms ease, border-color 140ms ease, background 140ms ease; }
    .settings-trigger:hover { transform: translateY(-1px); border-color: rgba(249, 115, 22, 0.32); background: rgba(255, 255, 255, 0.08); }
    .settings-trigger svg { width: 18px; height: 18px; display: block; }
    .results-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
    .results-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
    .video-card { display: block; border-radius: 22px; overflow: hidden; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); color: inherit; text-decoration: none; box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24); transition: transform 160ms ease, border-color 160ms ease; }
    .video-card:hover { transform: translateY(-2px); border-color: rgba(249, 115, 22, 0.36); }
    .video-thumb-wrap { position: relative; aspect-ratio: 9 / 16; background: rgba(255, 255, 255, 0.05); overflow: hidden; }
    .video-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-rank { position: absolute; top: 10px; left: 10px; padding: 6px 8px; border-radius: 999px; background: rgba(6, 14, 28, 0.82); color: #fff; font-size: 0.75rem; font-weight: 700; backdrop-filter: blur(12px); }
    .video-views { position: absolute; right: 10px; bottom: 10px; padding: 7px 10px; border-radius: 999px; background: rgba(249, 115, 22, 0.9); color: #fff; font-size: 0.75rem; font-weight: 700; box-shadow: 0 10px 24px rgba(249, 115, 22, 0.25); }
    .video-meta { padding: 12px 14px 14px; }
    .video-title { font-size: 0.96rem; font-weight: 700; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.7em; }
    .video-channel { margin-top: 8px; color: var(--text-muted); font-size: 0.84rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .video-stats { margin-top: 10px; color: rgba(255, 255, 255, 0.8); font-size: 0.78rem; display: flex; justify-content: space-between; gap: 10px; }
    .batch-list { display: flex; flex-direction: column; gap: 10px; }
    .batch-entry { position: relative; display: flex; gap: 8px; align-items: stretch; }
    .batch-leading-slot { width: 36px; min-width: 36px; display: flex; align-items: center; justify-content: center; }
    .batch-leading-action { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.28); background: rgba(127, 29, 29, 0.2); color: #fecaca; cursor: pointer; transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, opacity 140ms ease; }
    .batch-leading-action:hover { transform: translateY(-1px); background: rgba(127, 29, 29, 0.3); border-color: rgba(248, 113, 113, 0.45); }
    .batch-leading-action.running { box-shadow: 0 0 0 rgba(239, 68, 68, 0.28); animation: running-action 1.4s ease-out infinite; }
    .batch-leading-action.resume { border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.16); color: #bbf7d0; }
    .batch-leading-action.resume:hover { background: rgba(34, 197, 94, 0.24); border-color: rgba(74, 222, 128, 0.44); }
    .batch-leading-action.completed { border-color: rgba(148, 163, 184, 0.22); background: rgba(51, 65, 85, 0.4); color: #cbd5e1; cursor: default; }
    .batch-leading-action:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .batch-leading-action svg { width: 14px; height: 14px; display: block; }
    .batch-item { flex: 1; width: 100%; text-align: left; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; background: rgba(255, 255, 255, 0.03); color: #fff; padding: 12px 14px; cursor: pointer; transition: border-color 140ms ease, background 140ms ease, padding-right 140ms ease; }
    .batch-item:hover { border-color: rgba(249, 115, 22, 0.32); background: rgba(255, 255, 255, 0.05); }
    .batch-item.active { border-color: rgba(249, 115, 22, 0.5); background: rgba(249, 115, 22, 0.1); }
    .batch-entry.can-delete .batch-item { padding-right: 56px; }
    .batch-item-title { font-weight: 700; margin-bottom: 4px; }
    .batch-item-meta { color: var(--text-muted); font-size: 0.8rem; }
    .batch-delete { position: absolute; top: 50%; right: 10px; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.28); background: rgba(127, 29, 29, 0.18); color: #fecaca; cursor: pointer; box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22); opacity: 0; pointer-events: none; transform: translateY(-50%) scale(0.92); transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease, transform 140ms ease; }
    .batch-entry.can-delete:hover .batch-delete, .batch-entry.can-delete:focus-within .batch-delete { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); }
    .batch-delete:hover { background: rgba(127, 29, 29, 0.32); border-color: rgba(248, 113, 113, 0.45); }
    .batch-delete svg { width: 16px; height: 16px; display: block; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; }
    .suggestions .badge { padding: 8px 10px; border-radius: 999px; }
    .log-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .log-item { border-radius: 16px; padding: 12px 14px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); }
    .log-item.warn { border-color: rgba(245, 158, 11, 0.35); }
    .log-item.error { border-color: rgba(239, 68, 68, 0.35); }
    .empty-state { padding: 22px; border-radius: 22px; background: rgba(255, 255, 255, 0.035); border: 1px dashed rgba(255, 255, 255, 0.14); color: var(--text-muted); }
    .progress-card { margin-bottom: 18px; padding: 16px; border-radius: 22px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.03)); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04); }
    .progress-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .progress-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255, 255, 255, 0.58); }
    .progress-caption { margin-top: 4px; color: rgba(255, 255, 255, 0.84); font-size: 0.95rem; }
    .progress-value { font-size: 1.4rem; font-weight: 700; color: #fb923c; }
    .progress-track { position: relative; height: 12px; border-radius: 999px; overflow: hidden; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.06); }
    .progress-track.live::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.16), transparent); transform: translateX(-100%); animation: progress-sheen 1.4s linear infinite; }
    .progress-fill { position: relative; z-index: 1; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #f97316 0%, #fb923c 45%, #22c55e 100%); box-shadow: 0 0 18px rgba(249, 115, 22, 0.3); transition: width 260ms ease; }
    .progress-steps { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .progress-step { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.03); color: rgba(255, 255, 255, 0.46); font-size: 0.78rem; }
    .progress-step.done { border-color: rgba(34, 197, 94, 0.24); background: rgba(21, 128, 61, 0.16); color: #bbf7d0; }
    .progress-step.current { border-color: rgba(249, 115, 22, 0.32); background: rgba(249, 115, 22, 0.16); color: #fed7aa; }
    .chart-card { margin-bottom: 18px; padding: 16px; border-radius: 22px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
    .chart-card #score-chart { height: 190px; }
    .sort-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .limit-control { display: inline-flex; align-items: center; gap: 8px; padding: 0 0 0 10px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(255, 255, 255, 0.04); color: rgba(255, 255, 255, 0.8); min-height: 38px; }
    .limit-input { width: 78px; border: 0; background: transparent; color: #fff; box-shadow: none; }
    .limit-input:focus { background: transparent; color: #fff; box-shadow: none; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .control-row { display: flex; gap: 10px; align-items: stretch; }
    .primary-cta { flex: 1; min-height: 56px; border-radius: 18px; font-weight: 700; }
    .settings-modal-backdrop { position: fixed; inset: 0; z-index: 1800; display: flex; align-items: center; justify-content: center; padding: 24px; background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(12px); }
    .settings-modal { width: min(560px, 100%); max-height: calc(100vh - 48px); padding: 22px; overflow: auto; }
    .settings-modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
    .settings-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
    textarea.form-control { min-height: 132px; }
    @keyframes live-pulse { 0% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    @keyframes running-action { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.26); } 70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    @keyframes progress-sheen { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    @media (max-width: 1500px) { .app-shell { grid-template-columns: 320px minmax(0, 1fr) 320px; } }
    @media (max-width: 1200px) { .app-shell { grid-template-columns: 320px minmax(0, 1fr); } .app-shell .panel:last-child { grid-column: 1 / -1; min-height: 280px; } }
    @media (max-width: 860px) { body { overflow: auto; } .app-shell { height: auto; min-height: 100%; grid-template-columns: 1fr; } .stat-grid { grid-template-columns: 1fr; } .results-wall { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); } .control-row { flex-direction: column; } .settings-modal-backdrop { align-items: flex-start; padding: 16px; } .settings-modal { max-height: calc(100vh - 32px); } }
  </style>
</head>
<body>
  <div id="boot-splash" class="boot-splash">
    <div class="boot-shell">
      <div class="boot-radar" aria-hidden="true">
        <div class="boot-sweep"></div>
      </div>
      <div>
        <div class="boot-title">AI YouTube Shorts Radar</div>
        <div class="boot-subtle">Loading your local trend radar</div>
      </div>
      <div class="boot-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
